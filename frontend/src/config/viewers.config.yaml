# Fileglancer OME-Zarr Viewers Configuration
#
# To customize, copy this file to frontend/viewers.config.yaml (which is
# gitignored) and edit your copy. The override takes precedence at build time.
#
# After editing, rebuild with: pixi run node-build
# (or use watch mode: pixi run dev-watch)
#
# Each viewer entry requires:
#   - manifest_url: URL or absolute path to a capability manifest YAML file
#     Use absolute paths (e.g. /viewers/neuroglancer.yaml) for manifests bundled
#     in the public/ directory, or full URLs for externally hosted manifests.
#
# Optional:
#   - instance_template_url: Override the viewer's template_url from the manifest
#   - label: Custom tooltip text (defaults to "View in {Name}")

viewers:
  - manifest_url: 'https://raw.githubusercontent.com/BioImageTools/capability-manifest/host-manifests-and-docs/manifests/neuroglancer.yaml'

  - manifest_url: 'https://raw.githubusercontent.com/BioImageTools/capability-manifest/host-manifests-and-docs/manifests/avivator.yaml'

  - manifest_url: 'https://raw.githubusercontent.com/BioImageTools/capability-manifest/host-manifests-and-docs/manifests/validator.yaml'

  - manifest_url: 'https://raw.githubusercontent.com/BioImageTools/capability-manifest/host-manifests-and-docs/manifests/vole.yaml'
